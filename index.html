    <title>Meus Contatos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Fundo claro e fonte estilo máquina de escrever (monospace) */
        body {
            background-color: #f6f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1a201d; /* Cinza bem escuro/esverdeado */
        }

        .profile-container {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 1rem;
        }

        /* Estilos dos textos de perfil */
        .profile-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .profile-location {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.8rem;
        }

        .profile-description {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* Ícones sociais enfileirados */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .social-icons a {
            color: #1a201d;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #555;
        }

        /* Botões em formato de pílula (Pill) */
        .contact-btn {
            background-color: transparent; /* Fundo transparente */
            color: #1a201d;
            font-size: 1rem; 
            border: 1.5px solid #1a201d; /* Borda escura */
            border-radius: 50px; /* Bordas totalmente arredondadas */
            padding: 1rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Subtítulo dentro do botão (opcional) */
        .btn-subtitle {
            font-size: 0.75rem;
            margin-top: 0.2rem;
            color: #555;
        }

        /* Efeito ao passar o mouse */
        .contact-btn:hover {
            background-color: #1a201d;
            color: #ffffff;
        }

        .contact-btn:hover .btn-subtitle {
            color: #dddddd;
        }
    </style>
</head>
